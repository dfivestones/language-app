<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>외국어 표현 복습</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; min-height: 100vh; }

    .header { background: white; padding: 14px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header h1 { font-size: 17px; font-weight: 700; }
    .header .stats { font-size: 11px; color: #999; }

    .nav { display: flex; background: white; border-bottom: 2px solid #f0f0f0; position: sticky; top: 49px; z-index: 9; }
    .nav-btn { flex: 1; padding: 11px 4px; text-align: center; border: none; background: none; cursor: pointer; font-size: 12px; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .nav-btn.active { color: #6c63ff; border-bottom-color: #6c63ff; font-weight: 600; }

    .section { display: none; padding: 20px 16px; }
    .section.active { display: block; }

    /* Flashcard */
    .card-container { perspective: 1000px; margin: 8px auto 16px; max-width: 380px; }
    .card { width: 100%; height: 220px; position: relative; transform-style: preserve-3d; transition: transform 0.45s; cursor: pointer; }
    .card.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; box-shadow: 0 4px 24px rgba(108,99,255,0.15); }
    .card-front { background: linear-gradient(135deg, #6c63ff 0%, #9c8fff 100%); color: white; }
    .card-back { background: white; transform: rotateY(180deg); border: 2px solid #e8e5ff; }
    .card-lang { font-size: 12px; opacity: 0.75; margin-bottom: 10px; letter-spacing: 0.5px; }
    .card-expression { font-size: 30px; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
    .card-hint { font-size: 12px; opacity: 0.6; }
    .card-meaning { font-size: 20px; font-weight: 700; color: #2d2d44; margin-bottom: 8px; }
    .card-example { font-size: 13px; color: #666; font-style: italic; line-height: 1.4; }
    .card-memo { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.3; }

    .progress-wrap { max-width: 380px; margin: 0 auto 4px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .progress-bar { background: #eee; border-radius: 100px; height: 5px; }
    .progress-fill { background: linear-gradient(90deg, #6c63ff, #9c8fff); height: 100%; border-radius: 100px; transition: width 0.4s; }

    .review-btns { display: flex; gap: 10px; max-width: 380px; margin: 12px auto 8px; }
    .btn { padding: 12px 16px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; flex: 1; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-wrong { background: #ffe5e5; color: #e53e3e; }
    .btn-correct { background: #e6ffed; color: #2f9e44; }
    .btn-wrong:hover { background: #ffd0d0; }
    .btn-correct:hover { background: #d0f5dd; }
    .btn-primary { background: #6c63ff; color: white; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-secondary { background: #f0f0f0; color: #666; font-size: 13px; }
    .btn-full { width: 100%; }
    .btn-mastered { width: 100%; max-width: 380px; display: block; margin: 0 auto; background: #f8f5ff; color: #9c8fff; font-size: 13px; }

    /* Add form */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-control { width: 100%; padding: 10px 13px; border: 1.5px solid #e4e4e4; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; background: white; }
    .form-control:focus { border-color: #6c63ff; }
    textarea.form-control { resize: vertical; min-height: 64px; line-height: 1.5; }
    .section-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .section-sub { font-size: 13px; color: #999; margin-bottom: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* List */
    .filter-bar { display: flex; gap: 7px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 6px 13px; border: 1.5px solid #e4e4e4; border-radius: 100px; background: white; cursor: pointer; font-size: 12px; white-space: nowrap; transition: all 0.15px; font-weight: 500; }
    .filter-btn.active { border-color: #6c63ff; background: #6c63ff; color: white; }
    .expr-card { background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .expr-card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; flex-wrap: wrap; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 600; }
    .badge-cn { background: #ffe0e0; color: #c00; }
    .badge-jp { background: #dde8ff; color: #3a5; }
    .badge-due { background: #fff3cd; color: #856404; }
    .badge-done { background: #d4edda; color: #155724; }
    .expr-title { font-size: 19px; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; }
    .expr-meaning { font-size: 14px; color: #555; margin-bottom: 5px; }
    .expr-example { font-size: 12px; color: #888; font-style: italic; margin-bottom: 6px; line-height: 1.4; }
    .expr-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; background: #f4f4f4; color: #777; }
    .expr-footer { font-size: 11px; color: #ccc; margin-top: 7px; }
    .expr-memo { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* Setup banner */
    .setup-banner { background: #fff3cd; border: 1.5px solid #ffc107; border-radius: 14px; padding: 16px; margin-bottom: 20px; }
    .setup-banner h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; color: #856404; }
    .setup-banner p { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 10px; }
    .setup-banner input { width: 100%; padding: 8px 12px; border: 1.5px solid #e4e4e4; border-radius: 8px; font-size: 13px; font-family: monospace; margin-bottom: 8px; outline: none; }
    .setup-banner input:focus { border-color: #6c63ff; }

    /* States */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-size: 15px; color: #bbb; line-height: 1.5; }
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 14px; }
    .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .loading-wrap p { font-size: 13px; color: #bbb; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .review-done { text-align: center; padding: 40px 20px; }
    .done-emoji { font-size: 60px; margin-bottom: 14px; }
    .done-title { font-size: 21px; font-weight: 700; margin-bottom: 8px; }
    .done-sub { font-size: 14px; color: #888; line-height: 1.5; margin-bottom: 20px; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: #2d2d44; color: white; padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.28s cubic-bezier(.21,1.02,.73,1); z-index: 999; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #add-status { text-align: center; margin-top: 10px; font-size: 13px; color: #888; min-height: 18px; }

    /* ── AI Chat ───────────────────────────────────────────── */
    #tab-chat.active { display: flex !important; flex-direction: column; height: calc(100vh - 95px); padding: 0; }

    .chat-apikey-wrap { padding: 20px 16px; overflow-y: auto; }

    .chat-ui-wrap { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .chat-toolbar { padding: 6px 12px; display: flex; justify-content: flex-end; gap: 4px; border-bottom: 1px solid #f0f0f0; background: white; flex-shrink: 0; }
    .chat-tool-btn { background: none; border: none; font-size: 11px; color: #bbb; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    .chat-tool-btn:hover { background: #f5f5f5; color: #888; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 10px; }

    .chat-bubble { max-width: 88%; word-break: break-word; }
    .chat-bubble.user { align-self: flex-end; }
    .chat-bubble.assistant { align-self: flex-start; }

    .bubble-text { padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
    .chat-bubble.user .bubble-text { background: #6c63ff; color: white; border-radius: 16px 16px 4px 16px; }
    .chat-bubble.assistant .bubble-text { background: white; color: #1a1a2e; border-radius: 16px 16px 16px 4px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }

    .chat-thinking { align-self: flex-start; padding: 12px 16px; background: white; border-radius: 16px 16px 16px 4px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .thinking-dots { display: flex; gap: 5px; align-items: center; }
    .thinking-dots span { width: 7px; height: 7px; border-radius: 50%; background: #bbb; display: inline-block; animation: tdot 1.2s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    .expr-check-section { margin-top: 8px; background: #f8f5ff; border-radius: 12px; padding: 11px; }
    .expr-check-header { font-size: 11px; font-weight: 700; color: #6c63ff; margin-bottom: 8px; }
    .expr-check-card { display: flex; align-items: flex-start; gap: 9px; background: white; border-radius: 10px; padding: 9px 10px; margin-bottom: 6px; cursor: pointer; border: 1.5px solid #e8e5ff; transition: border-color 0.15s; }
    .expr-check-card:has(input:checked) { border-color: #6c63ff; }
    .expr-check-card input[type="checkbox"] { margin-top: 3px; accent-color: #6c63ff; width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
    .expr-check-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .expr-check-meaning { font-size: 13px; color: #555; }
    .expr-check-example { font-size: 11px; color: #888; font-style: italic; margin-top: 2px; line-height: 1.4; }

    .chat-input-area { padding: 8px 12px 10px; border-top: 1px solid #f0f0f0; background: white; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    .chat-input-area textarea { flex: 1; resize: none; height: 40px; max-height: 100px; padding: 9px 13px; border: 1.5px solid #e4e4e4; border-radius: 20px; font-size: 14px; font-family: inherit; outline: none; line-height: 1.4; overflow-y: auto; }
    .chat-input-area textarea:focus { border-color: #6c63ff; }
    .chat-send-btn { width: 40px; height: 40px; border-radius: 50%; background: #6c63ff; color: white; border: none; cursor: pointer; font-size: 20px; line-height: 1; flex-shrink: 0; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
    .chat-send-btn:hover { background: #5a52d5; }
    .chat-send-btn:disabled { background: #ccc; cursor: not-allowed; }

    .img-attach-btn { width: 36px; height: 36px; background: #f0f0f0; border: none; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
    .img-attach-btn:hover { background: #e0e0e0; }
    .bubble-img { max-width: 100%; max-height: 200px; border-radius: 10px; margin-bottom: 6px; display: block; }
  </style>
</head>
<body>

<div class="header">
  <h1>🗣️ 외국어 표현</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="stats" id="headerStats">불러오는 중...</div>
    <button onclick="refreshData()" id="refreshBtn" style="background:none;border:none;font-size:18px;cursor:pointer;padding:2px;line-height:1" title="새로고침">🔄</button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" data-tab="review" onclick="switchTab('review',this)">📚 복습</button>
  <button class="nav-btn" data-tab="add" onclick="switchTab('add',this)">➕ 추가</button>
  <button class="nav-btn" data-tab="list" onclick="switchTab('list',this)">📋 목록</button>
  <button class="nav-btn" data-tab="chat" onclick="switchTab('chat',this)">💬 AI</button>
</div>

<!-- 복습 탭 -->
<div id="tab-review" class="section active">
  <div id="review-content">
    <div class="loading-wrap"><div class="spinner"></div><p>불러오는 중...</p></div>
  </div>
</div>

<!-- 추가 탭 -->
<div id="tab-add" class="section">
  <div class="section-title">새 표현 추가</div>
  <div class="section-sub">모임에서 배운 표현을 기록하세요</div>

  <div class="form-group">
    <label class="form-label">언어 *</label>
    <select id="add-lang" class="form-control">
      <option value="🇨🇳 중국어">🇨🇳 중국어</option>
      <option value="🇯🇵 일본어">🇯🇵 일본어</option>
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">표현 *</label>
      <input type="text" id="add-expr" class="form-control" placeholder="예: なるほど" />
    </div>
    <div class="form-group">
      <label class="form-label">뜻 *</label>
      <input type="text" id="add-meaning" class="form-control" placeholder="한국어 뜻" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">예문</label>
    <textarea id="add-example" class="form-control" placeholder="예문 (선택)"></textarea>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select id="add-category" class="form-control">
        <option>일상</option><option>인사</option><option>음식</option>
        <option>감정</option><option>여행</option><option>비즈니스</option><option>기타</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">난이도</label>
      <select id="add-level" class="form-control">
        <option value="⭐ 초급">⭐ 초급</option>
        <option value="⭐⭐ 중급">⭐⭐ 중급</option>
        <option value="⭐⭐⭐ 고급">⭐⭐⭐ 고급</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">메모</label>
    <textarea id="add-memo" class="form-control" placeholder="뉘앙스, 사용 상황 등 메모 (선택)"></textarea>
  </div>

  <button class="btn btn-primary btn-full" onclick="addExpression()">저장 💾</button>
  <div id="add-status"></div>
</div>

<!-- 전체 목록 탭 -->
<div id="tab-list" class="section">
  <div class="section-title">전체 표현</div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('cn',this)">🇨🇳 중국어</button>
    <button class="filter-btn" onclick="setFilter('jp',this)">🇯🇵 일본어</button>
    <button class="filter-btn" onclick="setFilter('due',this)">📅 복습 필요</button>
    <button class="filter-btn" onclick="setFilter('mastered',this)">✅ 암기완료</button>
  </div>
  <div id="list-content">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- AI 채팅 탭 -->
<div id="tab-chat" class="section">
  <!-- API 키 없을 때 -->
  <div id="chat-apikey-section" class="chat-apikey-wrap">
    <div class="section-title">💬 AI 언어 도우미</div>
    <div class="section-sub">중국어·일본어 표현을 물어보고 단어장에 추가하세요</div>
    <div class="setup-banner">
      <h3>🔑 Anthropic API 키 설정</h3>
      <p>AI 채팅 기능을 사용하려면 Anthropic API 키가 필요합니다.<br>
         <a href="https://console.anthropic.com" target="_blank" style="color:#856404;font-weight:600">console.anthropic.com</a>에서 발급받으세요.</p>
      <input type="password" id="apikey-input" placeholder="sk-ant-..." />
      <button class="btn btn-primary btn-full" onclick="saveApiKey()">저장하고 시작하기</button>
      <p style="font-size:11px;color:#aaa;margin-top:8px">키는 이 기기에만 저장됩니다 (localStorage)</p>
    </div>
  </div>

  <!-- 채팅 UI -->
  <div id="chat-ui-wrap" class="chat-ui-wrap" style="display:none">
    <div class="chat-toolbar">
      <button class="chat-tool-btn" onclick="resetChat()">🗑️ 대화 초기화</button>
      <button class="chat-tool-btn" onclick="clearApiKey()">🔑 키 변경</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-area">
      <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      <div style="flex:1;display:flex;flex-direction:column;min-width:0;gap:6px">
        <div id="img-preview-wrap" style="display:none;position:relative;width:fit-content">
          <img id="img-preview" style="max-height:72px;border-radius:10px;border:1.5px solid #e0dfff;display:block">
          <button onclick="removeImage()" style="position:absolute;top:-7px;right:-7px;width:20px;height:20px;background:#e53e3e;color:white;border:none;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">✕</button>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <button class="img-attach-btn" onclick="document.getElementById('img-file-input').click()" title="사진 첨부">📷</button>
          <textarea id="chat-input" placeholder="중국어/일본어 표현에 대해 물어보세요..." onkeydown="chatKeydown(event)" style="flex:1;resize:none;height:40px;max-height:100px;padding:9px 13px;border:1.5px solid #e4e4e4;border-radius:20px;font-size:14px;font-family:inherit;outline:none;line-height:1.4;overflow-y:auto;"></textarea>
          <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()" title="전송">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  let expressions = [];
  let progress = {};
  let reviewQueue = [];
  let reviewIndex = 0;
  let currentFilter = 'all';

  // ── Firebase ──────────────────────────────────────────────

  async function loadExpressions() {
    const r = await fetch(`${FIREBASE_URL}/expressions.json`);
    if (!r.ok) throw new Error(`Firebase 오류: ${r.status}`);
    const data = await r.json();
    if (data && Array.isArray(data) && data.length > 0) {
      expressions = data;
    } else {
      expressions = SEED_DATA.map(e => stripProgress(e));
      await saveExpressionsToFirebase();
    }
  }

  async function saveExpressionsToFirebase() {
    const r = await fetch(`${FIREBASE_URL}/expressions.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(expressions.map(e => stripProgress(e)))
    });
    if (!r.ok) throw new Error(`저장 실패: ${r.status}`);
  }

  function stripProgress(e) {
    const { 복습횟수, 다음복습, 완전암기, ...rest } = e;
    return rest;
  }

  // ── 개인 복습 기록 (localStorage) ────────────────────────

  function loadProgress() {
    try { progress = JSON.parse(localStorage.getItem('lang_progress') || '{}'); }
    catch { progress = {}; }
  }

  function saveProgress() {
    localStorage.setItem('lang_progress', JSON.stringify(progress));
  }

  function getMerged(expr) {
    const p = progress[expr.id] || { 복습횟수: 0, 다음복습: today(), 완전암기: false };
    return { ...expr, ...p };
  }

  // ── Spaced repetition ──────────────────────────────────────

  function today() { return new Date().toISOString().slice(0,10); }
  function isDue(e) { return !e.완전암기 || e.다음복습 <= today(); }

  function calcNextReview(reviewCount, correct) {
    const d = new Date();
    if (!correct) { d.setDate(d.getDate() + 1); return d.toISOString().slice(0,10); }
    const days = Math.min(Math.pow(2, reviewCount), 30);
    d.setDate(d.getDate() + Math.round(days));
    return d.toISOString().slice(0,10);
  }

  // ── Tab nav ───────────────────────────────────────────────

  function switchTab(tab, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (btn) btn.classList.add('active');
    if (tab === 'list') renderList();
    if (tab === 'chat') initChat();
  }

  // ── Review ────────────────────────────────────────────────

  function renderReview() {
    const merged = expressions.map(getMerged);
    reviewQueue = merged.filter(e => !e.완전암기 && isDue(e));
    reviewIndex = 0;
    updateStats();

    if (reviewQueue.length === 0) {
      document.getElementById('review-content').innerHTML = `
        <div class="review-done">
          <div class="done-emoji">🎉</div>
          <div class="done-title">오늘 복습 완료!</div>
          <div class="done-sub">복습할 표현이 없어요.<br>새 표현을 추가해볼까요?</div>
          <button class="btn btn-primary" onclick="switchTab('add', document.querySelectorAll('.nav-btn')[1])">➕ 표현 추가하기</button>
        </div>`;
      return;
    }
    showCard();
  }

  function showCard() {
    if (reviewIndex >= reviewQueue.length) {
      document.getElementById('review-content').innerHTML = `
        <div class="review-done">
          <div class="done-emoji">🏆</div>
          <div class="done-title">모두 완료!</div>
          <div class="done-sub">${reviewQueue.length}개 표현을 복습했어요.</div>
          <button class="btn btn-secondary" onclick="renderReview()">다시 보기</button>
        </div>`;
      return;
    }
    const e = reviewQueue[reviewIndex];
    const pct = Math.round((reviewIndex / reviewQueue.length) * 100);
    document.getElementById('review-content').innerHTML = `
      <div class="progress-wrap">
        <div class="progress-label"><span>${reviewIndex + 1} / ${reviewQueue.length}</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="card-container">
        <div class="card" id="flashcard" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-lang">${e.언어} &nbsp; ${e.난이도 || ''}</div>
            <div class="card-expression">${e.표현}</div>
            <div class="card-hint">탭하여 뜻 확인 👆</div>
          </div>
          <div class="card-face card-back">
            <div class="card-meaning">${e.뜻}</div>
            ${e.예문 ? `<div class="card-example">${e.예문}</div>` : ''}
            ${e.메모 ? `<div class="card-memo">💡 ${e.메모}</div>` : ''}
          </div>
        </div>
      </div>
      <div id="review-btns" style="display:none">
        <div class="review-btns">
          <button class="btn btn-wrong" onclick="reviewAnswer(false)">❌ 몰라요</button>
          <button class="btn btn-correct" onclick="reviewAnswer(true)">✅ 알아요!</button>
        </div>
        <button class="btn btn-mastered" onclick="markMastered()">🏅 완전 암기 완료로 표시</button>
      </div>`;
  }

  function flipCard() {
    const c = document.getElementById('flashcard');
    if (!c) return;
    c.classList.toggle('flipped');
    if (c.classList.contains('flipped')) document.getElementById('review-btns').style.display = 'block';
  }

  function reviewAnswer(correct) {
    const expr = reviewQueue[reviewIndex];
    const p = progress[expr.id] || { 복습횟수: 0, 완전암기: false };
    const cnt = correct ? (p.복습횟수 || 0) + 1 : 0;
    progress[expr.id] = { 복습횟수: cnt, 완전암기: false, 다음복습: calcNextReview(cnt, correct) };
    saveProgress();
    reviewIndex++;
    showCard();
  }

  function markMastered() {
    const expr = reviewQueue[reviewIndex];
    progress[expr.id] = { 복습횟수: (progress[expr.id]?.복습횟수 || 0), 완전암기: true, 다음복습: null };
    saveProgress();
    showToast('🏅 암기 완료!');
    reviewIndex++;
    showCard();
  }

  // ── Add ───────────────────────────────────────────────────

  async function addExpression() {
    const 표현 = document.getElementById('add-expr').value.trim();
    const 뜻 = document.getElementById('add-meaning').value.trim();
    const 언어 = document.getElementById('add-lang').value;
    if (!표현 || !뜻) { showToast('표현과 뜻은 필수입니다'); return; }

    const status = document.getElementById('add-status');
    status.textContent = '💾 저장 중...';

    const newExpr = {
      id: 'u-' + Date.now(),
      표현, 언어, 뜻,
      예문: document.getElementById('add-example').value.trim(),
      카테고리: document.getElementById('add-category').value,
      난이도: document.getElementById('add-level').value,
      메모: document.getElementById('add-memo').value.trim(),
      추가날짜: today()
    };

    try {
      expressions.push(newExpr);
      await saveExpressionsToFirebase();
      progress[newExpr.id] = { 복습횟수: 0, 완전암기: false, 다음복습: today() };
      saveProgress();
      ['add-expr','add-meaning','add-example','add-memo'].forEach(id => document.getElementById(id).value = '');
      status.textContent = '';
      showToast('✅ 모두에게 추가됨!');
      updateStats();
    } catch (e) {
      expressions.pop();
      status.textContent = '저장 실패: ' + (e.message || '다시 시도해주세요');
    }
  }

  // ── List ──────────────────────────────────────────────────

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderList();
  }

  function renderList() {
    let list = expressions.map(getMerged);
    if (currentFilter === 'cn') list = list.filter(e => e.언어.includes('중국어'));
    else if (currentFilter === 'jp') list = list.filter(e => e.언어.includes('일본어'));
    else if (currentFilter === 'due') list = list.filter(e => !e.완전암기 && isDue(e));
    else if (currentFilter === 'mastered') list = list.filter(e => e.완전암기);

    if (!list.length) {
      document.getElementById('list-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>표현이 없습니다</p></div>`;
      return;
    }
    document.getElementById('list-content').innerHTML = list.map(e => {
      const langClass = e.언어.includes('중국어') ? 'badge-cn' : 'badge-jp';
      const isOverdue = !e.완전암기 && isDue(e);
      return `<div class="expr-card">
        <div class="expr-card-top">
          <span class="badge ${langClass}">${e.언어}</span>
          ${isOverdue ? '<span class="badge badge-due">📅 복습 필요</span>' : ''}
          ${e.완전암기 ? '<span class="badge badge-done">✅ 암기완료</span>' : ''}
        </div>
        <div class="expr-title">${e.표현}</div>
        <div class="expr-meaning">${e.뜻}</div>
        ${e.예문 ? `<div class="expr-example">${e.예문}</div>` : ''}
        <div class="expr-tags">
          ${Array.isArray(e.카테고리) ? e.카테고리.map(c=>`<span class="tag">${c}</span>`).join('') : e.카테고리 ? `<span class="tag">${e.카테고리}</span>` : ''}
          ${e.난이도 ? `<span class="tag">${e.난이도}</span>` : ''}
          <span class="tag">내 복습 ${e.복습횟수 || 0}회</span>
        </div>
        ${e.메모 ? `<div class="expr-memo">💡 ${e.메모}</div>` : ''}
        <div class="expr-footer">추가: ${e.추가날짜 || '-'} ${e.다음복습 ? '· 다음복습: ' + e.다음복습 : ''}</div>
      </div>`;
    }).join('');
  }

  // ── Utils ─────────────────────────────────────────────────

  function updateStats() {
    const merged = expressions.map(getMerged);
    const due = merged.filter(e => !e.완전암기 && isDue(e)).length;
    const total = expressions.length;
    const mastered = merged.filter(e => e.완전암기).length;
    document.getElementById('headerStats').textContent = `총 ${total}개 · 오늘 ${due}개 · 완료 ${mastered}개`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ── Refresh ───────────────────────────────────────────────

  async function refreshData() {
    const btn = document.getElementById('refreshBtn');
    btn.style.animation = 'spin 0.7s linear infinite';
    try {
      await loadExpressions();
      renderReview();
      updateStats();
      if (currentFilter !== 'all') renderList();
      showToast('✅ 최신 단어 불러왔어요!');
    } catch (err) {
      showToast('새로고침 실패: ' + err.message);
    } finally {
      btn.style.animation = '';
    }
  }

  // ── AI Chat ───────────────────────────────────────────────

  const CHAT_SYSTEM_PROMPT = `당신은 중국어/일본어 회화 모임을 위한 언어 학습 도우미입니다. 한국어로 친절하게 답변해주세요.

사용자가 표현이나 단어에 대해 물어볼 때, 핵심 표현들을 반드시 아래 형식으로 포함해주세요:

[EXPR]표현|뜻|예문(한국어 번역 포함)|메모(뉘앙스/상황)|난이도|언어[/EXPR]

예시:
[EXPR]随便 (suíbiàn)|마음대로, 아무거나|你想吃什么？随便。(뭐 먹고 싶어? 아무거나.)|캐주얼. 무관심하게 들릴 수 있어 주의|⭐ 초급|🇨🇳 중국어[/EXPR]

규칙:
- 난이도는 반드시 ⭐ 초급 / ⭐⭐ 중급 / ⭐⭐⭐ 고급 중 하나
- 언어는 반드시 🇨🇳 중국어 또는 🇯🇵 일본어
- 표현이 없는 일반 질문에는 [EXPR] 태그 생략 가능
- 파이프(|) 구분자로 정확히 6개 항목

사진을 받으면: 사진 속 중국어/일본어 텍스트를 모두 인식하고 뜻·발음·뉘앙스를 설명한 뒤 [EXPR] 태그로 감싸주세요. 메뉴판, 간판, 책, 스크린샷 등 어떤 사진이든 처리하세요.`;

  let chatHistory = [];
  const chatExprStore = {};
  let chatInited = false;
  let pendingImage = null; // { data: base64, mediaType: string, previewUrl: string }

  function initChat() {
    const key = localStorage.getItem('anthropic_api_key');
    if (key) {
      document.getElementById('chat-apikey-section').style.display = 'none';
      document.getElementById('chat-ui-wrap').style.display = 'flex';
      if (!chatInited) {
        chatInited = true;
        showWelcomeChatMsg();
        const ta = document.getElementById('chat-input');
        if (ta) {
          ta.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
          });
        }
      }
    } else {
      document.getElementById('chat-apikey-section').style.display = 'block';
      document.getElementById('chat-ui-wrap').style.display = 'none';
    }
  }

  function saveApiKey() {
    const key = document.getElementById('apikey-input').value.trim();
    if (!key) { showToast('API 키를 입력해주세요'); return; }
    localStorage.setItem('anthropic_api_key', key);
    document.getElementById('apikey-input').value = '';
    chatInited = false;
    initChat();
  }

  function clearApiKey() {
    if (!confirm('API 키를 삭제하고 초기화면으로 돌아갑니까?')) return;
    localStorage.removeItem('anthropic_api_key');
    chatHistory = [];
    chatInited = false;
    document.getElementById('chat-messages').innerHTML = '';
    initChat();
  }

  function resetChat() {
    chatHistory = [];
    document.getElementById('chat-messages').innerHTML = '';
    Object.keys(chatExprStore).forEach(k => delete chatExprStore[k]);
    showWelcomeChatMsg();
  }

  function showWelcomeChatMsg() {
    appendChatBubble('assistant', '안녕하세요! 중국어나 일본어 표현에 대해 뭐든 물어보세요 😊\n\n예시:\n• "화가 났을 때 쓰는 중국어 표현 알려줘"\n• "비즈니스 일본어 이메일 인사말은?"\n• "오늘 배운 단어: 探店 — 비슷한 표현 더 있어?"\n\n관련 표현에 체크하면 단어장에 바로 추가할 수 있어요!');
  }

  function handleImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      pendingImage = { data: dataUrl.split(',')[1], mediaType: file.type || 'image/jpeg', previewUrl: dataUrl };
      document.getElementById('img-preview').src = dataUrl;
      document.getElementById('img-preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  function removeImage() {
    pendingImage = null;
    document.getElementById('img-preview-wrap').style.display = 'none';
    document.getElementById('img-preview').src = '';
  }

  function chatKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChatMessage();
    }
  }

  function parseExprs(text) {
    const exprs = [];
    const regex = /\[EXPR\]([\s\S]*?)\[\/EXPR\]/g;
    let m;
    while ((m = regex.exec(text)) !== null) {
      const parts = m[1].split('|').map(s => s.trim());
      if (parts.length >= 2 && parts[0] && parts[1]) {
        exprs.push({
          id: 'ai-' + Date.now() + '-' + Math.random().toString(36).slice(2,7),
          표현: parts[0] || '',
          뜻: parts[1] || '',
          예문: parts[2] || '',
          메모: parts[3] || '',
          난이도: parts[4] || '⭐ 초급',
          언어: parts[5] || '🇨🇳 중국어',
          카테고리: '일상',
          추가날짜: today()
        });
      }
    }
    return exprs;
  }

  function cleanMsgText(text) {
    return text.replace(/\[EXPR\][\s\S]*?\[\/EXPR\]/g, '').replace(/\n{3,}/g, '\n\n').trim();
  }

  function appendChatBubble(role, content, msgId, imageUrl) {
    const exprs = (role === 'assistant' && msgId) ? parseExprs(content) : [];
    const cleanContent = cleanMsgText(content);
    const container = document.getElementById('chat-messages');

    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${role}`;
    const imgHtml = imageUrl ? `<img src="${imageUrl}" class="bubble-img">` : '';
    bubble.innerHTML = `<div class="bubble-text">${imgHtml}${cleanContent.replace(/\n/g, '<br>')}</div>`;

    if (exprs.length > 0) {
      chatExprStore[msgId] = exprs;
      const cards = exprs.map((e, i) => {
        const langCls = e.언어.includes('중국어') ? 'badge-cn' : 'badge-jp';
        return `<label class="expr-check-card">
          <input type="checkbox" class="expr-checkbox" data-idx="${i}" checked>
          <div style="flex:1;min-width:0">
            <div class="expr-check-title">${e.표현} <span class="badge ${langCls}" style="font-size:9px">${e.언어}</span></div>
            <div class="expr-check-meaning">${e.뜻}</div>
            ${e.예문 ? `<div class="expr-check-example">${e.예문}</div>` : ''}
          </div>
        </label>`;
      }).join('');

      bubble.innerHTML += `
        <div class="expr-check-section" id="exprs-${msgId}">
          <div class="expr-check-header">📚 단어장에 추가할 표현 선택</div>
          ${cards}
          <button class="btn btn-primary btn-full" style="margin-top:8px;font-size:13px;padding:10px"
            onclick="addCheckedExprs('${msgId}',this)">✅ 선택 표현 단어장에 추가</button>
        </div>`;
    }

    container.appendChild(bubble);
    container.scrollTop = container.scrollHeight;
  }

  async function addCheckedExprs(msgId, btn) {
    const exprs = chatExprStore[msgId] || [];
    const section = document.getElementById('exprs-' + msgId);
    const checked = section.querySelectorAll('.expr-checkbox:checked');
    const idxs = new Set([...checked].map(cb => Number(cb.dataset.idx)));
    const toAdd = exprs.filter((_, i) => idxs.has(i));

    if (toAdd.length === 0) { showToast('선택된 표현이 없습니다'); return; }

    btn.disabled = true;
    btn.textContent = '추가 중...';

    try {
      for (const expr of toAdd) {
        if (!expressions.find(e => e.표현 === expr.표현)) {
          const newId = 'ai-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
          const entry = { ...expr, id: newId };
          expressions.push(entry);
          progress[newId] = { 복습횟수: 0, 완전암기: false, 다음복습: today() };
        }
      }
      await saveExpressionsToFirebase();
      saveProgress();
      updateStats();
      btn.textContent = `✅ ${toAdd.length}개 추가됨!`;
      btn.style.background = '#2f9e44';
      showToast(`🎉 ${toAdd.length}개 표현이 단어장에 추가됐어요!`);
    } catch (err) {
      btn.disabled = false;
      btn.textContent = '✅ 선택 표현 단어장에 추가';
      showToast('추가 실패: ' + err.message);
    }
  }

  async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text && !pendingImage) return;

    const apiKey = localStorage.getItem('anthropic_api_key');
    if (!apiKey) { showToast('API 키가 없습니다'); return; }

    input.value = '';
    input.style.height = 'auto';

    // Build user content (text only or text+image)
    const imgSnap = pendingImage;
    let userContent;
    if (imgSnap) {
      userContent = [
        { type: 'image', source: { type: 'base64', media_type: imgSnap.mediaType, data: imgSnap.data } },
        { type: 'text', text: text || '이 사진의 중국어/일본어 표현을 인식하고 설명해줘' }
      ];
    } else {
      userContent = text;
    }

    appendChatBubble('user', text || '📷', null, imgSnap?.previewUrl);
    chatHistory.push({ role: 'user', content: userContent });
    if (imgSnap) removeImage();

    const sendBtn = document.getElementById('chat-send-btn');
    sendBtn.disabled = true;

    const container = document.getElementById('chat-messages');
    const thinking = document.createElement('div');
    thinking.className = 'chat-thinking';
    thinking.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
    container.appendChild(thinking);
    container.scrollTop = container.scrollHeight;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 2048,
          system: CHAT_SYSTEM_PROMPT,
          messages: chatHistory.map(m => ({ role: m.role, content: m.content }))
        })
      });

      if (thinking.parentNode) thinking.parentNode.removeChild(thinking);

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `API 오류 ${res.status}`);
      }

      const data = await res.json();
      const reply = data.content?.[0]?.text || '';
      chatHistory.push({ role: 'assistant', content: reply });
      const msgId = 'msg-' + Date.now();
      appendChatBubble('assistant', reply, msgId);

    } catch (err) {
      if (thinking.parentNode) thinking.parentNode.removeChild(thinking);
      appendChatBubble('assistant', `⚠️ 오류가 발생했습니다: ${err.message}\n\nAPI 키를 확인해주세요.`);
    } finally {
      sendBtn.disabled = false;
    }
  }

  // ── Init ──────────────────────────────────────────────────

  (async () => {
    try {
      loadProgress();
      await loadExpressions();
      renderReview();
      updateStats();
    } catch (err) {
      document.getElementById('review-content').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>데이터를 불러오지 못했습니다.<br><small style="color:#ddd">${err.message}</small></p>
        </div>`;
    }
  })();
</script>
</body>
</html>
